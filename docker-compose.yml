version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: spatial-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: spatial-website
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - spatial-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spatial-server
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/spatial-website?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      USE_AZURE_STORAGE: ${USE_AZURE_STORAGE:-false}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_CONTAINER_NAME: ${AZURE_CONTAINER_NAME:-spatial-images}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@spatial.ucsb.edu}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    ports:
      - "3001:3001"
    volumes:
      # Mount for local image storage (if not using Azure)
      - ./server/public/images:/app/server/public/images
    networks:
      - spatial-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/graphql"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  spatial-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local


